<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SportCal">
  <meta name="theme-color" content="#185FA5">
  <link rel="manifest" href="manifest.json">
  <title>Mon Calendrier Sportif</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeede9;
      --text: #1a1a1a; --text2: #6b6b6b; --text3: #a8a8a8;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --radius: 10px; --radius-lg: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
        --text: #f2f2f7; --text2: #aeaeb2; --text3: #636366;
        --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
    .app { max-width: 600px; margin: 0 auto; background: var(--bg3); min-height: 100vh; padding-bottom: 100px; }
    .topbar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 12px 16px 10px; position: sticky; top: 0; z-index: 50; }
    .topbar-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { width: 36px; height: 36px; background: #185FA5; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .brand-icon svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; }
    .brand-text h1 { font-size: 16px; font-weight: 600; }
    .brand-text p { font-size: 11px; color: var(--text2); }
    .month-nav { display: flex; align-items: center; gap: 8px; }
    .nav-btn { width: 32px; height: 32px; border: 0.5px solid var(--border2); background: var(--bg2); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text); }
    .month-lbl { font-size: 14px; font-weight: 600; min-width: 130px; text-align: center; }
    .sport-filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-chip { font-size: 11px; font-weight: 600; padding: 4px 11px; border-radius: 99px; border: 1px solid transparent; cursor: pointer; display: flex; align-items: center; gap: 4px; user-select: none; transition: opacity 0.15s; }
    .filter-chip.hockey  { background: #E6F1FB; color: #185FA5; border-color: #B5D4F4; }
    .filter-chip.soccer  { background: #EAF3DE; color: #3B6D11; border-color: #C0DD97; }
    .filter-chip.deck    { background: #FAEEDA; color: #854F0B; border-color: #FAC775; }
    .filter-chip.tournoi { background: #FBEAF0; color: #993556; border-color: #F4C0D1; }
    .filter-chip.inactive { opacity: 0.32; }
    .filter-chip.autre { background: #F1EFE8; color: #5F5E5A; border-color: #B4B2A9; }
    .stats-bar { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 16px; }
    .stat-pill { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 600; }
    .stat-pill.total    { background: var(--bg2); color: var(--text2); }
    .stat-pill.t-hockey { background: #E6F1FB; color: #185FA5; }
    .stat-pill.t-soccer { background: #EAF3DE; color: #3B6D11; }
    .stat-pill.t-deck   { background: #FAEEDA; color: #854F0B; }
    .stat-pill.t-autre  { background: #F1EFE8; color: #5F5E5A; }
    .proc-banner { display: none; align-items: center; gap: 10px; margin: 0 12px 8px; padding: 10px 14px; background: #E6F1FB; border-radius: var(--radius); font-size: 13px; color: #185FA5; font-weight: 500; }
    .spinner { width: 16px; height: 16px; border: 2px solid #B5D4F4; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.75s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-banner { display: none; margin: 0 12px 8px; padding: 10px 14px; background: #FCEBEB; border-radius: var(--radius); font-size: 13px; color: #A32D2D; }
    .cal-wrap { margin: 0 12px; background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }
    .grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 0.5px; background: var(--border); }
    .dh { background: var(--bg2); padding: 6px 2px; text-align: center; font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
    .dc { background: var(--bg); min-height: 72px; padding: 4px; }
    .dc.om { background: var(--bg3); }
    .dn { font-size: 11px; font-weight: 500; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin-bottom: 2px; color: var(--text2); }
    .dc.today .dn { background: #185FA5; color: #fff; }
    .dc.om .dn { color: var(--text3); }
    .ep { font-size: 9px; padding: 2px 4px; border-radius: 3px; margin-bottom: 1px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; line-height: 1.5; display: flex; align-items: center; gap: 2px; }
    .ep.has-note::after { content: '✎'; font-size: 8px; margin-left: auto; opacity: 0.55; }
    .ep.hockey  { background: #E6F1FB; color: #185FA5; }
    .ep.soccer  { background: #EAF3DE; color: #3B6D11; }
    .ep.deck    { background: #FAEEDA; color: #854F0B; }
    .ep.tournoi { background: #FBEAF0; color: #993556; }
    .ep.autre   { background: #F1EFE8; color: #5F5E5A; }
    .ep .dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
    .ep.hockey .dot  { background: #185FA5; }
    .ep.soccer .dot  { background: #3B6D11; }
    .ep.deck .dot    { background: #854F0B; }
    .ep.tournoi .dot { background: #993556; }
    .ep.autre .dot   { background: #5F5E5A; }
    .ep.hf { display: none; }
    .more-tag { font-size: 9px; color: var(--text3); padding: 1px 3px; }
    .fab { position: fixed; z-index: 100; width: 58px; height: 58px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
    #fabCamera { bottom: 24px; right: 20px; background: #185FA5; box-shadow: 0 4px 16px rgba(24,95,165,0.4); }
    #fabAdd    { bottom: 24px; right: 90px; background: #3B6D11; box-shadow: 0 4px 16px rgba(59,109,17,0.4); }
    .fab svg { width: 26px; height: 26px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; }
    .fab input { display: none; }
    .modal-wrap { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end; justify-content: center; }
    .modal-wrap.open { display: flex; }
    .modal { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding-bottom: env(safe-area-inset-bottom, 16px); }
    .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 10px auto 14px; }
    .modal-head { padding: 0 20px 12px; display: flex; align-items: flex-start; justify-content: space-between; }
    .modal-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; display: inline-flex; align-items: center; gap: 5px; margin-bottom: 5px; }
    .modal-badge.hockey  { background: #E6F1FB; color: #185FA5; }
    .modal-badge.soccer  { background: #EAF3DE; color: #3B6D11; }
    .modal-badge.deck    { background: #FAEEDA; color: #854F0B; }
    .modal-badge.tournoi { background: #FBEAF0; color: #993556; }
    .modal-badge.new     { background: #EAF3DE; color: #3B6D11; }
    .modal-title { font-size: 17px; font-weight: 600; line-height: 1.3; }
    .close-x { background: var(--bg2); border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 20px; color: var(--text2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 4px; -webkit-tap-highlight-color: transparent; }
    .modal-tabs { display: flex; border-bottom: 0.5px solid var(--border); margin: 0 20px; }
    .tab-btn { flex: 1; padding: 10px 4px; font-size: 13px; font-weight: 600; background: none; border: none; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .tab-btn.active { color: #185FA5; border-bottom-color: #185FA5; }
    .tab-panel { display: none; padding: 16px 20px 20px; }
    .tab-panel.active { display: block; }
    .info-row { display: flex; gap: 10px; margin-bottom: 10px; font-size: 14px; }
    .info-lbl { color: var(--text2); min-width: 88px; flex-shrink: 0; font-size: 13px; }
    .info-val { color: var(--text); font-weight: 500; }
    .note-box { margin-top: 6px; padding: 12px; background: var(--bg2); border-radius: var(--radius); font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .no-note { font-size: 13px; color: var(--text3); font-style: italic; margin-top: 6px; }
    .form-row { margin-bottom: 14px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-input, .form-select, .notes-ta { width: 100%; padding: 10px 12px; font-size: 15px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-family: inherit; }
    .form-input:focus, .form-select:focus, .notes-ta:focus { outline: none; border-color: #185FA5; background: var(--bg); }
    .notes-ta { resize: vertical; min-height: 100px; line-height: 1.6; }
    .save-btn { width: 100%; padding: 13px; background: #185FA5; color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 4px; -webkit-tap-highlight-color: transparent; }
    .save-btn:active { background: #0C447C; }
    .saved-ok { font-size: 13px; color: #3B6D11; text-align: center; margin-top: 8px; display: none; font-weight: 500; }
    .del-panel { text-align: center; padding: 8px 0 4px; }
    .del-ico { width: 52px; height: 52px; background: #FCEBEB; border-radius: 50%; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
    .del-ico svg { width: 24px; height: 24px; stroke: #A32D2D; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .del-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .del-sub { font-size: 14px; color: var(--text2); margin-bottom: 22px; line-height: 1.5; }
    .del-confirm { width: 100%; padding: 13px; background: #A32D2D; color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-bottom: 10px; }
    .del-cancel  { width: 100%; padding: 13px; background: var(--bg2); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-row1">
      <div class="brand">
        <div class="brand-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15 15 0 010 20M2 12h20"/></svg></div>
        <div class="brand-text"><h1>Mon Calendrier Sportif</h1><p>Hockey · Soccer · Deck Hockey</p></div>
      </div>
      <div class="month-nav">
        <button class="nav-btn" id="prev">&#8249;</button>
        <div class="month-lbl" id="monthLbl"></div>
        <button class="nav-btn" id="next">&#8250;</button>
      </div>
    </div>
    <div class="sport-filters">
      <div class="filter-chip hockey" data-sport="hockey">🏒 Hockey</div>
      <div class="filter-chip soccer" data-sport="soccer">⚽ Soccer</div>
      <div class="filter-chip deck" data-sport="deck">👟 Deck</div>
      <div class="filter-chip tournoi" data-sport="tournoi">🏆 Tournoi</div>
      <div class="filter-chip autre" data-sport="autre">⭐ Autre</div>
    </div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="proc-banner" id="proc"><div class="spinner"></div><span id="procTxt">Analyse en cours…</span></div>
  <div class="err-banner" id="errBar"></div>
  <div class="cal-wrap"><div class="grid" id="grid"></div></div>
</div>

<button class="fab" id="fabCamera">
  <input type="file" id="fileInput" accept="image/*" multiple>
  <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
</button>
<button class="fab" id="fabAdd">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- MODAL ÉVÉNEMENT -->
<div class="modal-wrap" id="eventModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div><div class="modal-badge" id="mBadge"></div><div class="modal-title" id="mTitle"></div></div>
      <button class="close-x" id="closeEvent">&#215;</button>
    </div>
    <div class="modal-tabs">
      <button class="tab-btn active" data-tab="view">Détails</button>
      <button class="tab-btn" data-tab="edit">Modifier</button>
      <button class="tab-btn" data-tab="notes">Notes</button>
      <button class="tab-btn" data-tab="delete">Supprimer</button>
    </div>
    <div class="tab-panel active" id="tab-view"><div id="viewBody"></div></div>
    <div class="tab-panel" id="tab-edit">
      <div class="form-row"><label class="form-label">Titre</label><input class="form-input" id="e-title" type="text"></div>
      <div class="form-row"><label class="form-label">Sport</label>
        <select class="form-select" id="e-sport"><option value="Hockey">Hockey</option><option value="Soccer">Soccer</option><option value="Deck Hockey">Deck Hockey</option><option value="Tournoi">Tournoi</option><option value="Autre">Autre</option></select>
      </div>
      <div class="form-row-2">
        <div><label class="form-label">Date</label><input class="form-input" id="e-date" type="date"></div>
        <div><label class="form-label">Heure</label><input class="form-input" id="e-time" type="time"></div>
      </div>
      <div class="form-row"><label class="form-label">Adversaire</label><input class="form-input" id="e-opponent" type="text"></div>
      <div class="form-row"><label class="form-label">Lieu</label><input class="form-input" id="e-location" type="text"></div>
      <div class="form-row"><label class="form-label">Ligue</label><input class="form-input" id="e-league" type="text"></div>
      <button class="save-btn" id="saveEditBtn">Enregistrer les modifications</button>
    </div>
    <div class="tab-panel" id="tab-notes">
      <p style="font-size:13px;color:var(--text2);margin-bottom:10px;">Notes personnelles pour cet événement.</p>
      <textarea class="notes-ta" id="notesArea" placeholder="Équipement, covoiturage, objectifs…"></textarea>
      <button class="save-btn" id="saveNoteBtn">Enregistrer la note</button>
      <div class="saved-ok" id="savedOk">Note enregistrée ✓</div>
    </div>
    <div class="tab-panel" id="tab-delete">
      <div class="del-panel">
        <div class="del-ico"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></div>
        <div class="del-title">Supprimer cet événement ?</div>
        <div class="del-sub" id="delSub">Cette action est irréversible.</div>
        <button class="del-confirm" id="delConfirm">Oui, supprimer</button>
        <button class="del-cancel" id="delCancel">Annuler</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL AJOUTER -->
<div class="modal-wrap" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div><div class="modal-badge new" style="margin-bottom:5px;">Nouvel événement</div><div class="modal-title">Ajouter manuellement</div></div>
      <button class="close-x" id="closeAdd">&#215;</button>
    </div>
    <div style="padding:16px 20px 20px;">
      <div class="form-row"><label class="form-label">Titre</label><input class="form-input" id="a-title" type="text" placeholder="Ex: Match vs Condors"></div>
      <div class="form-row"><label class="form-label">Sport</label>
        <select class="form-select" id="a-sport"><option value="Hockey">Hockey</option><option value="Soccer">Soccer</option><option value="Deck Hockey">Deck Hockey</option><option value="Tournoi">Tournoi</option><option value="Autre">Autre</option></select>
      </div>
      <div class="form-row-2">
        <div><label class="form-label">Date</label><input class="form-input" id="a-date" type="date"></div>
        <div><label class="form-label">Heure</label><input class="form-input" id="a-time" type="time"></div>
      </div>
      <div class="form-row"><label class="form-label">Adversaire</label><input class="form-input" id="a-opponent" type="text" placeholder="Équipe adverse"></div>
      <div class="form-row"><label class="form-label">Lieu</label><input class="form-input" id="a-location" type="text" placeholder="Aréna, terrain…"></div>
      <div class="form-row"><label class="form-label">Ligue</label><input class="form-input" id="a-league" type="text" placeholder="Nom de la ligue"></div>
      <div class="form-row"><label class="form-label">Notes</label><textarea class="notes-ta" id="a-note" placeholder="Informations supplémentaires…" style="min-height:70px;"></textarea></div>
      <button class="save-btn" id="saveAddBtn">Ajouter au calendrier</button>
    </div>
  </div>
</div>

<script>
var DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
var MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
var activeFilters=new Set(['hockey','soccer','deck','tournoi','autre']);
var events=[];
try{ events=JSON.parse(localStorage.getItem('sportcal_v5')||'[]'); }catch(e){}
var current=new Date();
var selectedId=null;

function save(){ try{ localStorage.setItem('sportcal_v5',JSON.stringify(events)); }catch(e){} }
function getEv(){ return events.find(function(e){ return e.id===selectedId; }); }

function sportKey(s){
  if(!s) return 'hockey';
  var v=s.toLowerCase();
  if(v.includes('deck')) return 'deck';
  if(v.includes('tournoi')||v.includes('tournament')||v.includes('cup')||v.includes('coupe')) return 'tournoi';
  if(v.includes('soccer')||v.includes('foot')) return 'soccer';
  if(v.includes('autre')||v.includes('other')) return 'autre';
  return 'hockey';
}
function sportLabel(k){ return {hockey:'Hockey',soccer:'Soccer',deck:'Deck Hockey',tournoi:'Tournoi',autre:'Autre'}[k]||k; }

function renderStats(){
  var y=current.getFullYear(), m=current.getMonth();
  var me=events.filter(function(e){ if(!e.date)return false; var p=e.date.split('-'); return parseInt(p[0])===y&&parseInt(p[1])-1===m; });
  var c={hockey:0,soccer:0,deck:0,tournoi:0,autre:0};
  me.forEach(function(e){ var k=sportKey(e.sport); if(c[k]!==undefined)c[k]++; });
  document.getElementById('statsBar').innerHTML=
    '<span class="stat-pill total">'+me.length+' ce mois</span>'+
    (c.hockey?'<span class="stat-pill t-hockey">'+c.hockey+' hockey</span>':'')+
    (c.soccer?'<span class="stat-pill t-soccer">'+c.soccer+' soccer</span>':'')+
    (c.deck?'<span class="stat-pill t-deck">'+c.deck+' deck</span>':'')+
    (c.autre?'<span class="stat-pill t-autre">'+c.autre+' autre</span>':'');
}

function renderCal(){
  var y=current.getFullYear(), m=current.getMonth();
  document.getElementById('monthLbl').textContent=MONTHS[m]+' '+y;
  renderStats();
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  DAYS.forEach(function(d){ var h=document.createElement('div'); h.className='dh'; h.textContent=d; grid.appendChild(h); });
  var firstDay=new Date(y,m,1).getDay();
  var dim=new Date(y,m+1,0).getDate();
  var today=new Date();
  for(var i=0;i<firstDay;i++){
    var pv=new Date(y,m,i-firstDay+1).getDate();
    var c2=document.createElement('div'); c2.className='dc om';
    c2.innerHTML='<div class="dn">'+pv+'</div>'; grid.appendChild(c2);
  }
  for(var d=1;d<=dim;d++){
    var cell=document.createElement('div'); cell.className='dc';
    if(today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d) cell.classList.add('today');
    var dn=document.createElement('div'); dn.className='dn'; dn.textContent=d; cell.appendChild(dn);
    var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var de=events.filter(function(e){ return e.date===ds; });
    de.slice(0,3).forEach(function(ev){
      var sk=sportKey(ev.sport);
      var pill=document.createElement('div');
      pill.className='ep '+sk+(activeFilters.has(sk)?'':' hf')+(ev.note?' has-note':'');
      pill.innerHTML='<span class="dot"></span><span style="overflow:hidden;text-overflow:ellipsis;flex:1;">'+(ev.title||sportLabel(sk))+'</span>';
      pill.addEventListener('click', (function(id){ return function(){ openEventModal(id); }; })(ev.id));
      cell.appendChild(pill);
    });
    if(de.length>3){ var mt=document.createElement('div'); mt.className='more-tag'; mt.textContent='+'+( de.length-3); cell.appendChild(mt); }
    grid.appendChild(cell);
  }
  var rem=(7-(firstDay+dim)%7)%7;
  for(var d2=1;d2<=rem;d2++){ var c3=document.createElement('div'); c3.className='dc om'; c3.innerHTML='<div class="dn">'+d2+'</div>'; grid.appendChild(c3); }
}

function openEventModal(id, tab){

  badge.textContent=sportLabel(sk);
  document.getElementById('mTitle').textContent=ev.title||'Événement';

  document.getElementById('savedOk').style.display='none';
  document.getElementById('delSub').textContent='"'+(ev.title||'Cet événement')+'" sera supprimé.';

}

function populateView(ev){
  var rows=[['Date',ev.date],['Heure',ev.time],['Adversaire',ev.opponent],['Lieu',ev.location],['Ligue',ev.league],['Type',ev.eventType]].filter(function(r){ return r[1]; });
  var html=rows.map(function(r){
    if(r[0]==='Lieu' && r[1]){
      var mapsUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(r[1]);
      return '<div class="info-row"><span class="info-lbl">'+r[0]+'</span><span class="info-val"><a href="'+mapsUrl+'" target="_blank" style="color:#185FA5;text-decoration:none;display:flex;align-items:center;gap:4px;">'+r[1]+'<svg style="width:12px;height:12px;flex-shrink:0;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></a></span></div>';
    }
    return '<div class="info-row"><span class="info-lbl">'+r[0]+'</span><span class="info-val">'+r[1]+'</span></div>';
  }).join('');
  if(ev.note) html+='<div class="info-row" style="margin-top:6px;"><span class="info-lbl">Notes</span></div><div class="note-box">'+ev.note+'</div>';
  else html+='<div class="no-note">Aucune note — appuie sur "Notes" pour en ajouter.</div>';
  document.getElementById('viewBody').innerHTML=html;
}

async function handleFiles(files){
  if(!files.length) return;
  var proc=document.getElementById('proc'), err=document.getElementById('errBar');
  err.style.display='none'; proc.style.display='flex';
  for(var i=0;i<files.length;i++){
    document.getElementById('procTxt').textContent='Analyse image '+(i+1)+'/'+files.length+'…';
    try{
      var b64=await toB64(files[i]);
      var extracted=await callAI(b64,files[i].type);
      if(extracted&&extracted.length){
        extracted.forEach(function(ev){ ev.id=Date.now()+Math.random(); events.push(ev); });
        save();
        var first=extracted.find(function(e){ return e.date; });
        if(first){ var p=first.date.split('-'); if(p[0]&&p[1]) current=new Date(parseInt(p[0]),parseInt(p[1])-1,1); }
        renderCal();
      }
    }catch(e){
      err.textContent='Erreur : '+(e.message||"Impossible d'analyser l'image");
      err.style.display='block';
    }
  }
  proc.style.display='none';
  document.getElementById('fileInput').value='';
}

function toB64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){ res(r.result.split(',')[1]); };
    r.onerror=function(){ rej(new Error('Lecture échouée')); };
    r.readAsDataURL(file);
  });
}

var GEMINI_API_KEY = 'AIzaSyBLymCxoUOsa4UINgQSJKdc7pPmBmnBqUk';

async function callAI(b64,mt){
  var prompt = "Tu analyses une capture d'écran d'une application sportive (XPS, Rétroaction, NBHPA) d'un joueur de hockey, soccer et deck hockey au Québec.\nExtrait TOUS les événements visibles. Retourne un JSON array uniquement, sans markdown.\nChaque objet: title, sport (Hockey/Soccer/Deck Hockey/Tournoi/Autre), date (YYYY-MM-DD), time (HH:MM), opponent, location, league, eventType, note (vide).\nToutes les dates en 2026. Réponds UNIQUEMENT avec le JSON array.";
  var resp=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+GEMINI_API_KEY,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:mt,data:b64}},{text:prompt}]}]})
  });
  var data=await resp.json();
  if(data.error) throw new Error(typeof data.error==='object'?(data.error.message||JSON.stringify(data.error)):data.error);
  if(!data.candidates||!data.candidates[0]) throw new Error('Réponse vide de Gemini');
  var txt=data.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
  return JSON.parse(txt);
}
